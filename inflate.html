    const data = src.data;

    const sr = SPOT_INK.rgb[0] / 255;
    const sg = SPOT_INK.rgb[1] / 255;
    const sb = SPOT_INK.rgb[2] / 255;

    // `screen(d, x, y)` returns 0..1 ink coverage for a target density d
    // [0..1] at pixel (x, y). The screening method depends on `effect`:
    //   duotone → continuous tone (no screening, density passes through)
    //   dither  → Bayer ordered dither, bi-level output
    //   halftone → clustered-dot screen, bi-level dotted output
    let screen;
    if (effect === 'duotone') {
      screen = (d) => d;
    } else if (effect === 'dither') {
      screen = (d, x, y) => {
        const t = BAYER_4[y & 3][x & 3];
        return d * 255 > t ? 1 : 0;
      };
    } else { // halftone
      screen = (d, x, y) => {
        const t = HALFTONE_8[y & 7][x & 7];
        return d * 255 > t ? 1 : 0;
      };
    }

    if (colors === 1) {
      // Single black drum — luminance drives ink density on paper.
      const out = document.createElement('canvas');
      out.width = w; out.height = h;
      const octx = out.getContext('2d');
      const dst = octx.createImageData(w, h);
      const d = dst.data;
      let i = 0;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const L = (0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2]) / 255;
          const inkK = Math.pow(1 - L, 1.4);
          const cov = screen(inkK, x, y);
          // Plate convention: 0 = full ink, 255 = no ink.
          const v = Math.round(255 * (1 - cov));
          d[i] = v; d[i + 1] = v; d[i + 2] = v; d[i + 3] = 255;
          i += 4;
        }
      }
      octx.putImageData(dst, 0, 0);
      const label = effect.toUpperCase() + ' · BLACK';
      return [{ canvas: out, label: 'PLATE 1 / ' + label }];
    }

    // Two-ink separation — K (black) + spot (fluorescent pink).
    // Scene luminance drives both plates with complementary curves:
    //   inkK = (1-L)^1.4  → black is heaviest in shadows
    //   inkS = L^0.7      → spot is heaviest in highlights/midtones
    const previewC = document.createElement('canvas');
    const plateK = document.createElement('canvas');
    const plateS = document.createElement('canvas');
    previewC.width = plateK.width = plateS.width = w;
    previewC.height = plateK.height = plateS.height = h;
    const previewD = previewC.getContext('2d').createImageData(w, h);
    const plateKD = plateK.getContext('2d').createImageData(w, h);
    const plateSD = plateS.getContext('2d').createImageData(w, h);

    let i = 0;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const L = (0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2]) / 255;
        const inkK = Math.pow(1 - L, 1.4);
        const inkS = Math.pow(L, 0.7);
        const covK = screen(inkK, x, y);
        const covS = screen(inkS, x, y);

        // Preview — paper white, K ink darkens, spot ink tints toward
        // its color. Reads close to the actual print pull.
        let r = 1 - covK, g = 1 - covK, b = 1 - covK;
        r = r * (1 - covS) + r * sr * covS;
        g = g * (1 - covS) + g * sg * covS;
        b = b * (1 - covS) + b * sb * covS;
        previewD.data[i]     = Math.round(r * 255);
        previewD.data[i + 1] = Math.round(g * 255);
        previewD.data[i + 2] = Math.round(b * 255);
        previewD.data[i + 3] = 255;

        // Per-drum plate files (0 = full ink, 255 = no ink).
        const kVal = Math.round(255 * (1 - covK));
        const sVal = Math.round(255 * (1 - covS));
        plateKD.data[i]     = kVal; plateKD.data[i + 1] = kVal; plateKD.data[i + 2] = kVal; plateKD.data[i + 3] = 255;
        plateSD.data[i]     = sVal; plateSD.data[i + 1] = sVal; plateSD.data[i + 2] = sVal; plateSD.data[i + 3] = 255;
        i += 4;
      }
    }
    previewC.getContext('2d').putImageData(previewD, 0, 0);
    plateK.getContext('2d').putImageData(plateKD, 0, 0);
    plateS.getContext('2d').putImageData(plateSD, 0, 0);

    const eff = effect.toUpperCase();
    return [
      { canvas: previewC, label: 'PREVIEW · ' + eff + ' · BLACK + ' + SPOT_INK.name },
      { canvas: plateK,   label: 'PLATE 1 / BLACK · ' + eff },
      { canvas: plateS,   label: 'PLATE 2 / ' + SPOT_INK.name + ' · ' + eff },
    ];
  }

  // Wrap the page canvases in a Letter-size PDF. Page is 612 × 792 pt
  // (8.5 × 11 in × 72 pt/in). Each canvas is 5100 × 6600 px so when
  // scaled to fill the page it lands at exactly 600 DPI on print.
  function writePDF(pages, filename) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
    for (let i = 0; i < pages.length; i++) {
      if (i > 0) pdf.addPage();
      // JPEG quality 0.95 — keeps file size reasonable (~3-8 MB) while
      // preserving fine matcap gradients. Use PNG for plates so the
      // grayscale ramp doesn't pick up JPEG ringing along ink edges.
      const isPlate = pages[i].label.startsWith('PLATE');
      const fmt = isPlate ? 'PNG' : 'JPEG';
      const dataUrl = pages[i].canvas.toDataURL(
        isPlate ? 'image/png' : 'image/jpeg',
        0.95
      );
      pdf.addImage(dataUrl, fmt, 0, 0, 612, 792, undefined, 'FAST');
      if (pages.length > 1) {
        pdf.setFontSize(7);
        pdf.setTextColor(120);
        pdf.text(pages[i].label + '   ·   ' + (i + 1) + '/' + pages.length, 18, 786);
      }
    }
    pdf.save(filename);
  }

  // ---------------------------------------------------------------
  // 10. Layout
  // ---------------------------------------------------------------
  function fitStage() {
    const ratio = POSTER_W / POSTER_H;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let cw, ch;
    if (vw / vh > ratio) {
      ch = vh * 0.92;
      cw = ch * ratio;
    } else {
      cw = vw * 0.92;
      ch = cw / ratio;
    }
    const scale = cw / POSTER_W;
    stage.style.transform = `scale(${scale})`;
  }

  function showHud() {
    document.body.classList.remove('idle');
    if (hudTimer) clearTimeout(hudTimer);
    hudTimer = setTimeout(() => document.body.classList.add('idle'), 3500);
  }

  // ---------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------
  initThree();
  bindInput();
  fitStage();
  loadFontAndStart();
  showHud();
  requestAnimationFrame(tick);

  // Debug bridge — exposed only to make manual smoke testing possible
  // from devtools / preview eval. Letters live in module scope; this
  // gives a tiny window into them without touching production behavior.
  window.__inflateDebug = {
    state: () => ({
      frame: frameCount,
      mode, trackMode,
      gazeActive, mouseGaze, eyeEnabled, dragging,
      gazeNX: gazeNX.toFixed(3), gazeNY: gazeNY.toFixed(3),
      gazeSX: gazeSX.toFixed(3), gazeSY: gazeSY.toFixed(3),
      headNX: headNX.toFixed(3), headNY: headNY.toFixed(3),
      headOffset: [headOffsetX.toFixed(2), headOffsetY.toFixed(2)],
      fitScale: wordGroup ? wordGroup.scale.x.toFixed(3) : '-',
      groupPos: wordGroup ? [wordGroup.position.x.toFixed(2), wordGroup.position.y.toFixed(2)] : null,
      letterPositions: letters.map(L => ({
        char: L.char,
        rest: [L.restX.toFixed(2), L.restY.toFixed(2)],
        cur:  [L.x.toFixed(2),     L.y.toFixed(2)],
      })),
    }),
    setGaze: (nx, ny) => {
      gazeNX = nx; gazeNY = ny;
      gazeActive = true; mouseGaze = true;
    },
    setHead: (hx, hy) => {
      headNX = hx; headNY = hy;
      gazeActive = true; mouseGaze = true;
    },
    setTrackMode: (m) => {
      const btn = document.querySelector(`#track-toggle button[data-track="${m}"]`);
      if (btn) btn.click();
    },
  };

  </script>
</body>
</html>
