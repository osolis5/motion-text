<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon — Refracted Type Poster</title>
  <meta name="description" content="Animated type poster — mirrored composition with a noise-driven refraction material distorting the lower half">
  <meta name="theme-color" content="#0A0A0A">

  <!-- Anton — condensed bold display. IBM Plex Mono for overlay labels. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- P5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <!-- Shared poster systems -->
  <script src="poster-system.js"></script>
  <script src="projection-mapping.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0A0A0A;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #sketch {
      display: block;
      box-shadow: 0 30px 120px rgba(0, 0, 0, 0.55);
    }
    #sketch canvas { display: block; }

    /* HUD */
    .hud {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.28);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      transition: opacity 0.8s ease;
    }
    .hud b {
      color: rgba(255, 255, 255, 0.55);
      font-weight: 400;
      margin-right: 2px;
    }
    .hud .sep {
      opacity: 0.35;
      margin: 0 10px;
    }
    body.idle .hud { opacity: 0; }

    /* Back link */
    .back {
      position: fixed;
      top: 22px;
      left: 24px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back:hover { color: rgba(255, 255, 255, 0.6); }
  </style>
</head>
<body>

  <a href="index.html" class="back">&larr; Back</a>

  <div id="sketch"></div>

  <div class="hud">
    <b>SPACE</b> Pause
    <span class="sep">·</span>
    <b>R</b> Re-roll
    <span class="sep">·</span>
    <b>↑ ↓</b> Refract
    <span class="sep">·</span>
    <b>H</b> Overlay
    <span class="sep">·</span>
    <b>P</b> Project
    <span class="sep">·</span>
    <b>S</b> Save
  </div>

  <script>
  // =====================================================
  // HORIZON — Refracted type poster
  // =====================================================
  // Composition: 4 lines of condensed display type stacked
  // on the top half (white on black), mirrored on the
  // bottom half (black on white). The top half stays
  // perfectly clean — above water. The bottom half is
  // distorted by a faux refraction "material": a low-res
  // 2D noise-gradient field is computed each frame and
  // used to offset the source-pixel lookup for every
  // destination pixel in the lower half. The field is
  // bilinearly sampled so the displacement is smooth,
  // and strength ramps up with depth² so the waterline
  // stays calm and the bottom is most warped.
  //
  // Pixel pipeline: src.pixels is cached once (static
  // composition). Each frame we write into a p5.Image's
  // pixel buffer via Uint32 views for speed, then blit
  // it to the main canvas in a single image() call.
  // =====================================================

  // Fixed internal resolution (scaled via CSS to fit the viewport)
  const POSTER_W = 720;
  const POSTER_H = 1000;

  // Composition — 4 lines of condensed display type
  const LINES = ["DON'T", 'THINK', 'TOO', 'HARD'];

  // --- Refraction material parameters ---
  let refractionStrength = 90;      // peak displacement (px) at full depth
  const REFRACT_FREQ_X  = 4.5;      // noise frequency across the field (x)
  const REFRACT_FREQ_Y  = 3.4;      // noise frequency across the field (y)
  const REFRACT_FREQ_X2 = 11.0;     // high-frequency detail octave (x)
  const REFRACT_FREQ_Y2 = 8.5;      // high-frequency detail octave (y)
  const DETAIL_MIX      = 0.45;     // weight of the detail octave
  const REFRACT_TIME_X  = 0.010;    // field drift speed (x)
  const REFRACT_TIME_Y  = 0.0075;   // field drift speed (y)

  // Low-res displacement field (bilinearly sampled per destination pixel)
  const FIELD_W = 60;
  const FIELD_H = 42;

  // --- State ---
  let src;            // offscreen graphics with clean composition (static)
  let srcCached32;    // Uint32 view of a stable copy of src.pixels
  let workImg;        // p5.Image used as per-frame pixel buffer
  let field = null;   // Float32Array of (dx, dy) pairs
  let t = 0;
  let paused = false;
  let overlayHidden = false;
  let fontReady = false;
  let fontSizes = [];
  let yPositions = [];
  let hudTimer = null;

  function setup() {
    const canvas = createCanvas(POSTER_W, POSTER_H);
    canvas.parent('sketch');
    pixelDensity(1); // density 1 — keeps pixel-manipulation fast

    src = createGraphics(POSTER_W, POSTER_H);
    src.pixelDensity(1);

    // Work image — used as the destination buffer for per-frame writes
    workImg = createImage(POSTER_W, POSTER_H);
    workImg.loadPixels();

    field = new Float32Array(FIELD_W * FIELD_H * 2);

    fitToViewport();
    window.addEventListener('resize', fitToViewport);

    // Wait for Anton to load before measuring text widths
    const ready = (document.fonts && document.fonts.load)
      ? document.fonts.load('96px Anton').catch(() => {})
      : Promise.resolve();

    ready.finally(() => {
      fontReady = true;
      layoutText();
      drawSource();
      // Cache src.pixels as a stable Uint32 view for fast sampling.
      src.loadPixels();
      const stable = new Uint8ClampedArray(src.pixels);
      srcCached32 = new Uint32Array(stable.buffer);
    });

    noiseSeed(Math.floor(Math.random() * 1e6) + 1);
    scheduleHudFade();
  }

  // Fit the canvas to the viewport while preserving the poster ratio.
  function fitToViewport() {
    const ratio = POSTER_W / POSTER_H;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let cw, ch;
    if (vw / vh > ratio) {
      ch = vh * 0.94;
      cw = ch * ratio;
    } else {
      cw = vw * 0.94;
      ch = cw / ratio;
    }
    const c = document.querySelector('#sketch canvas');
    if (c) {
      c.style.width = cw + 'px';
      c.style.height = ch + 'px';
    }
  }

  // Measure text widths and cache font sizes + y positions for each line.
  function layoutText() {
    const topH = POSTER_H / 2;
    const topMargin = POSTER_H * 0.018;
    const availH = topH - topMargin * 2;
    const lineSlot = availH / LINES.length;

    src.textFont('Anton');
    src.textAlign(CENTER, CENTER);

    fontSizes = [];
    yPositions = [];
    const maxWidth = POSTER_W * 0.92;

    for (let i = 0; i < LINES.length; i++) {
      src.textSize(400);
      const measured = Math.max(src.textWidth(LINES[i]), 1);
      const sizeByW = 400 * (maxWidth / measured);
      const sizeByH = lineSlot * 1.42;
      const size = Math.min(sizeByW, sizeByH);
      fontSizes.push(size);
      yPositions.push(topMargin + lineSlot * (i + 0.5));
    }
  }

  // Render the clean composition to `src`. Called once after font loads.
  function drawSource() {
    src.noStroke();

    // Top half — black
    src.fill(0);
    src.rect(0, 0, POSTER_W, POSTER_H / 2);

    // Bottom half — white
    src.fill(255);
    src.rect(0, POSTER_H / 2, POSTER_W, POSTER_H / 2);

    src.textFont('Anton');
    src.textAlign(CENTER, CENTER);

    // Top half — white text on black
    for (let i = 0; i < LINES.length; i++) {
      src.textSize(fontSizes[i]);
      src.fill(255);
      src.text(LINES[i], POSTER_W / 2, yPositions[i]);
    }

    // Bottom half — each line mirrored vertically around y = H/2,
    // drawn in black so it reads as a reflected inverse.
    for (let i = 0; i < LINES.length; i++) {
      const topY = yPositions[i];
      const bottomY = POSTER_H - topY;
      src.push();
      src.translate(POSTER_W / 2, bottomY);
      src.scale(1, -1);
      src.textSize(fontSizes[i]);
      src.fill(0);
      src.text(LINES[i], 0, 0);
      src.pop();
    }
  }

  // Compute a low-res 2D noise-gradient displacement field.
  // Two octaves of noise are combined so the field has large
  // smooth sweeps plus high-frequency detail — characteristic
  // of real refractive glass/water surfaces.
  function computeField() {
    const tx = t * REFRACT_TIME_X;
    const ty = t * REFRACT_TIME_Y;
    const eps = 0.02;

    for (let j = 0; j < FIELD_H; j++) {
      const v = j / (FIELD_H - 1);
      const ay1 = v * REFRACT_FREQ_Y  + ty;
      const ay2 = v * REFRACT_FREQ_Y2 + ty * 1.7;
      for (let i = 0; i < FIELD_W; i++) {
        const u = i / (FIELD_W - 1);
        const ax1 = u * REFRACT_FREQ_X  + tx;
        const ax2 = u * REFRACT_FREQ_X2 + tx * 1.7 + 13.0;

        // Octave 1 — large, smooth warps
        const n10 = noise(ax1, ay1);
        const n11 = noise(ax1 + eps, ay1);
        const n12 = noise(ax1, ay1 + eps);
        const dx1 = ((n11 - n10) / eps) / 3;
        const dy1 = ((n12 - n10) / eps) / 3;

        // Octave 2 — high-frequency detail
        const n20 = noise(ax2, ay2);
        const n21 = noise(ax2 + eps, ay2);
        const n22 = noise(ax2, ay2 + eps);
        const dx2 = ((n21 - n20) / eps) / 3;
        const dy2 = ((n22 - n20) / eps) / 3;

        const idx = (j * FIELD_W + i) * 2;
        field[idx]     = dx1 + dx2 * DETAIL_MIX;
        field[idx + 1] = dy1 + dy2 * DETAIL_MIX;
      }
    }
  }

  function draw() {
    if (!fontReady || !srcCached32) {
      background(10);
      fill(255, 40);
      noStroke();
      textAlign(CENTER, CENTER);
      textFont('monospace');
      textSize(9);
      text('·  LOADING  ·', width / 2, height / 2);
      return;
    }

    computeField();

    // Typed-array views into the destination + source pixel buffers
    const dst32 = new Uint32Array(workImg.pixels.buffer);
    const src32 = srcCached32;

    const W = POSTER_W;
    const H = POSTER_H;
    const halfH = H >> 1;

    // --- Top half — direct memcpy, no work ---
    dst32.set(src32.subarray(0, halfH * W));

    // --- Bottom half — refract per pixel ---
    const FW  = FIELD_W;
    const FH  = FIELD_H;
    const FW1 = FW - 1;
    const FH1 = FH - 1;
    const fxScale = FW1 / (W - 1);

    for (let y = halfH; y < H; y++) {
      // depth: 0 at horizon, 1 at the bottom of the frame
      const depth = (y - halfH) / halfH;
      const strength = refractionStrength * depth * depth;

      // Field-row interpolation in Y
      const fy = depth * FH1;
      const iy = fy | 0;
      const fracY = fy - iy;
      const invFracY = 1 - fracY;
      const iyNext = iy < FH1 ? iy + 1 : iy;
      const rowA = iy * FW * 2;
      const rowB = iyNext * FW * 2;

      const yBaseDst = y * W;

      for (let x = 0; x < W; x++) {
        // Field-col interpolation in X
        const fx = x * fxScale;
        const ix = fx | 0;
        const fracX = fx - ix;
        const invFracX = 1 - fracX;
        const ixNext = ix < FW1 ? ix + 1 : ix;

        const fxA = ix << 1;
        const fxB = ixNext << 1;

        // Bilinear weights
        const wAA = invFracX * invFracY;
        const wAB = fracX    * invFracY;
        const wBA = invFracX * fracY;
        const wBB = fracX    * fracY;

        // Interpolate dx and dy
        const dx = (field[rowA + fxA]     * wAA +
                    field[rowA + fxB]     * wAB +
                    field[rowB + fxA]     * wBA +
                    field[rowB + fxB]     * wBB) * strength;
        const dy = (field[rowA + fxA + 1] * wAA +
                    field[rowA + fxB + 1] * wAB +
                    field[rowB + fxA + 1] * wBA +
                    field[rowB + fxB + 1] * wBB) * strength;

        // Source coordinates (nearest neighbor sampling)
        let sx = (x + dx) | 0;
        let sy = (y + dy) | 0;

        // Clamp to the bottom half of the source
        if (sx < 0) sx = 0;
        else if (sx >= W) sx = W - 1;
        if (sy < halfH) sy = halfH;
        else if (sy >= H) sy = H - 1;

        // Single 32-bit RGBA copy
        dst32[yBaseDst + x] = src32[sy * W + sx];
      }
    }

    workImg.updatePixels();
    image(workImg, 0, 0);

    // --- Poster series metadata overlay ---
    // Horizon has a split composition — dark top half, light
    // bottom half (mirrored type). We render the overlay in two
    // passes so each strip reads against its paper color:
    //   • Top strip + vertical: invert=true  (black bg, white text)
    //   • Bottom strip:         invert=false (white bg, black text)
    if (window.POSTER_SYSTEM) {
      const verticalContent = LINES.join(' / ');
      // Top-half labels (dark paper)
      POSTER_SYSTEM.drawOverlay(drawingContext, {
        experimentId: '·',
        seriesName: 'HORIZON',
        verticalContent: verticalContent,
        topRight: 'REFRACT · ' + refractionStrength,
        invert: true,
        showBottom: false,
        hidden: overlayHidden,
      });
      // Bottom-half labels (light paper)
      POSTER_SYSTEM.drawOverlay(drawingContext, {
        bottomRight: null,
        invert: false,
        showTop: false,
        showVertical: false,
        hidden: overlayHidden,
      });
    }

    if (!paused) t += 1;
  }

  // -----------------------------
  // Input
  // -----------------------------

  function keyPressed() {
    showHud();

    if (key === ' ') { paused = !paused; return false; }

    if (key === 'r' || key === 'R') {
      noiseSeed(Math.floor(Math.random() * 1e6) + 1);
      return false;
    }

    if (key === 'h' || key === 'H') {
      overlayHidden = !overlayHidden;
      return false;
    }

    if (key === 's' || key === 'S') {
      // Force overlay visible so every export carries its identity
      // tags (experiment ID, series, refract strength, text).
      const prev = overlayHidden;
      overlayHidden = false;
      redraw();
      saveCanvas('horizon', 'png');
      overlayHidden = prev;
      return false;
    }

    if (keyCode === UP_ARROW) {
      refractionStrength = Math.min(refractionStrength + 8, 220);
      return false;
    }
    if (keyCode === DOWN_ARROW) {
      refractionStrength = Math.max(refractionStrength - 8, 0);
      return false;
    }
  }

  function mouseMoved() { showHud(); }

  // -----------------------------
  // HUD fade
  // -----------------------------

  function showHud() {
    document.body.classList.remove('idle');
    scheduleHudFade();
  }

  function scheduleHudFade() {
    if (hudTimer) clearTimeout(hudTimer);
    hudTimer = setTimeout(() => document.body.classList.add('idle'), 3500);
  }
  </script>

</body>
</html>
